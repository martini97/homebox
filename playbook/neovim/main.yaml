---
- name: enable neovim nightly copr
  become: true
  become_user: root
  community.general.copr:
    state: enabled
    name: agriffis/neovim-nightly
  tags:
    - neovim

- name: install neovim
  become: true
  become_user: root
  ansible.builtin.dnf5:
    name: "neovim"
    state: present
  tags:
    - neovim

- name: lua-language-server
  ansible.builtin.import_tasks: lua-language-server.yaml

- name: install neovim tools
  become: true
  become_user: root
  ansible.builtin.dnf5:
    name:
      - shfmt
      - ShellCheck
      - fzf
      - ripgrep
      - fd-find
      - bat
      - fswatch
      - nodejs-bash-language-server
      - black
    state: present
  tags:
    - neovim

- name: install npm dependencies for neovim
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop:
    - "@fsouza/prettierd"
    - "eslint_d"
    - "@vue/language-server"
    - "@vtsls/language-server"
    - "vscode-langservers-extracted"
    - "pyright"
  tags:
    - neovim

- name: install cargo dependencies for neovim
  community.general.cargo:
    name:
      - selene
      - stylua
  tags:
    - neovim
